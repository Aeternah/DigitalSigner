name: Release DigitalSigner

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            qtbase5-dev qttools5-dev-tools libssl-dev

      - name: Build and Test
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -G Ninja ..
          ninja
          ctest -V --output-on-failure

  release:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build \
            qtbase5-dev qttools5-dev-tools libssl-dev

      - name: Build Application
        run: |
          mkdir -p build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -G Ninja ..
          ninja

      - name: Build Docker Image
        run: |
          docker build -t digitalsigner:${{ github.ref_name }} .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/DigitalSigner
            build/DigitalSignerTests
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## DigitalSigner v2.1
            
            ### Что нового:
            - Полноценные Unit-тесты на GoogleTest
            - CI/CD пайплайн
            - Docker multi-stage build
            - Улучшенная структура проекта
            
            ### Артефакты в этом релизе:
            - Исполняемый файл `DigitalSigner`
            - Тесты `DigitalSignerTests`
            - Docker образ
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}