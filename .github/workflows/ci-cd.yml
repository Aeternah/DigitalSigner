name: Release DigitalSigner

on:
push:
tags:
- 'v*'

jobs:

test:
runs-on: ubuntu-24.04

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        cmake \
        ninja-build \
        qtbase5-dev \
        qttools5-dev-tools \
        libssl-dev

  - name: Configure
    run: |
      cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

  - name: Build
    run: |
      cmake --build build

  - name: Run tests
    run: |
      ctest --test-dir build -V --output-on-failure

release:
needs: test
runs-on: ubuntu-24.04

steps:
  - name: Checkout
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Install dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        build-essential \
        cmake \
        ninja-build \
        qtbase5-dev \
        qttools5-dev-tools \
        libssl-dev \
        zip

  - name: Configure
    run: |
      cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

  - name: Build
    run: |
      cmake --build build

  - name: Create archive
    run: |
      mkdir -p release

      cp build/DigitalSigner release/ || true

      tar -czf DigitalSigner-${{ github.ref_name }}-linux.tar.gz release

  - name: Build Docker image
    run: |
      docker build -t digitalsigner:${{ github.ref_name }} .

  - name: Create GitHub Release
    uses: softprops/action-gh-release@v2
    with:
      generate_release_notes: true
      draft: false
      prerelease: false
      files: |
        DigitalSigner-*.tar.gz
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}